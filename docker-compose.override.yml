services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    ports:
      - "${BACKEND_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__Authority: "http://localhost:${KEYCLOAK_PORT:-8080}/realms/taskapp"

  frontend:
    build:
      args:
        API_URL: http://localhost:${BACKEND_PORT:-5000}/api
        KEYCLOAK_URL: http://localhost:${KEYCLOAK_PORT:-8080}
