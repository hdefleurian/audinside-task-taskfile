# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

dotenv:
  - .env

tasks:
  default:
    desc: "Display available tasks"
    cmds:
      - task -a

  build:
    desc: "Build all components"
    cmds:
      - task build:backend
      - task build:frontend
    silent: true

  build:backend:
    desc: "Build backend"
    dir: ./backend
    cmds:
      - task build
    silent: true

  build:frontend:
    desc: "Build frontend"
    dir: ./frontend
    cmds:
      - task build
    silent: true

  run:backend:
    desc: "Run backend"
    dir: ./backend
    cmds:
      - task run
    silent: true

  run:frontend:
    desc: "Run frontend"
    dir: ./frontend
    cmds:
      - task run
    silent: true

  tests:
    desc: "Run tests for all components"
    cmds:
      - task tests:backend
      - task tests:frontend
    silent: true

  tests:backend:
    desc: "Run backend tests"
    dir: ./backend
    cmds:
      - task tests
    silent: true

  tests:frontend:
    desc: "Run frontend tests"
    dir: ./frontend
    cmds:
      - task tests
    silent: true

  clean:
    desc: "Clean all artifacts"
    cmds:
      - task clean:backend
      - task clean:frontend
    silent: true

  clean:backend:
    desc: "Clean backend build artifacts"
    dir: ./backend
    cmds:
      - task clean
    silent: true

  clean:frontend:
    desc: "Clean frontend build artifacts"
    dir: ./frontend
    cmds:
      - task clean
    silent: true

  docker:build:
    desc: "Build all Docker images"
    cmds:
      - task docker:build:backend
      - task docker:build:frontend
    silent: true

  docker:build:backend:
    desc: "Build backend Docker image"
    dir: ./backend
    cmds:
      - task docker:build
    silent: true

  docker:build:frontend:
    desc: "Build frontend Docker image"
    dir: ./frontend
    cmds:
      - task docker:build
    silent: true

  compose:start:
    desc: "Start all services with docker compose"
    cmds:
      - docker compose up -d
    silent: true

  compose:infra:
    desc: "Start infrastructure services (postgres and keycloak)"
    cmds:
      - docker compose up -d postgres keycloak
    silent: true

  compose:start:*:
    vars:
      SERVICE: '{{index .MATCH 0}}'
    desc: "Start {{.SERVICE}} service and dependencies with docker compose"
    cmds:
      - docker compose up -d {{.SERVICE}}
    silent: true

  compose:ps:
    desc: "List running services with docker compose"
    cmds:
      - docker compose ps
    silent: true

  compose:stop:all:
    desc: "Stop all services with docker compose"
    cmds:
      - docker compose down
    silent: true

  compose:stop:*:
    vars:
      SERVICE: '{{index .MATCH 0}}'
    desc: "Stop {{.SERVICE}} service with docker compose"
    cmds:
      - docker compose stop {{.SERVICE}}
    silent: true

  compose:build:backend:
    desc: "Build backend service with docker compose"
    cmds:
      - docker compose build backend
    silent: true

  compose:restart:backend:
    desc: "Restart backend service with docker compose"
    cmds:
      - task compose:stop:backend
      - task compose:build:backend
      - task compose:start:backend
    silent: true

  compose:build:frontend:
    desc: "Build frontend service with docker compose"
    cmds:
      - docker compose build frontend
    silent: true

  compose:restart:frontend:
    desc: "Restart frontend service with docker compose"
    cmds:
      - task compose:stop:frontend
      - task compose:build:frontend
      - task compose:start:frontend
    silent: true

  compose:logs:
    desc: "Follow logs of all services with docker compose"
    cmds:
      - docker compose logs -f

  compose:logs:*:
    vars:
      SERVICE: '{{index .MATCH 0}}'
    desc: "Follow logs of {{.SERVICE}} service with docker compose"
    cmds:
      - docker compose logs -f {{.SERVICE}}
    silent: true

  compose:clean:
    desc: "Remove all containers, volumes, and images for this project using docker compose"
    cmds:
      - docker compose down --volumes --rmi all --remove-orphans
    silent: true

  compose:prune:
    desc: "DANGER: Globally prune ALL unused Docker volumes and images on this machine"
    cmds:
      - docker volume prune -f
      - docker image prune -f
    silent: true

  db:migrate:
    desc: "Apply backend database migrations"
    dir: ./backend
    cmds:
      - task db:migrate
    silent: true

  db:migration:add:
    desc: "Add a backend EF Core migration (usage: task db:migration:add NAME=MyMigration)"
    requires:
      vars:
        - NAME
    dir: ./backend
    cmds:
      - task db:migration:add NAME={{.NAME}}
    silent: true

  db:migration:list:
    desc: "List backend EF Core migrations"
    dir: ./backend
    cmds:
      - task db:migration:list
    silent: true

  keycloak:export:
    desc: "Export taskapp Keycloak realm from running container"
    cmds:
      - docker compose exec keycloak /opt/keycloak/bin/kc.sh export --dir /opt/keycloak/data/import --realm taskapp
    silent: true
