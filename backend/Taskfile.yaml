version: '3'

vars:
  BUILD_CONFIGURATION: 'Release'
  SOLUTION_FILE: 'TaskApp.slnx'
  BACKEND_IMAGE_NAME: 'taskapp-backend'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'

tasks:
  default:
    desc: "Build and run the backend application"
    deps:
      - run

  restore:
    desc: "Restore backend dependencies"
    cmds:
      - echo "Restoring backend..."
      - dotnet restore {{.SOLUTION_FILE}}
    silent: true

  build:
    desc: "Build the backend project"
    deps:
      - restore
    cmds:
      - echo "Building backend..."
      - dotnet build {{.SOLUTION_FILE}} --no-restore --configuration {{.BUILD_CONFIGURATION}}
    silent: true

  rebuild:
    desc: "Rebuild the backend project"
    cmds:
      - task clean
      - task build
    silent: true

  run:deps:
    desc: "Start backend dependencies"
    cmds:
      - docker-compose -f docker-compose.deps.yaml up -d
    silent: true

  run:
    desc: "Run the backend application"
    deps:
      - build
      - run:deps
    env:
      ASPNETCORE_ENVIRONMENT: "Development"
      MongoDb__ConnectionString: "mongodb://localhost:27017"
      MongoDb__DatabaseName: "cvbuilder-db"
      Cache__Redis__ConnectionString: "localhost:6379"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
      Authentication__Authority: "http://localhost:8082"
      Authentication__Audience: "cv-builder-spa"
      Authentication__RequireHttpsMetadata: "false"
      Authentication__ValidateIssuer: "false"
    cmds:
      - echo "Running backend..."
      - dotnet run --project src/CVBuilder.Api/CVBuilder.Api.csproj --no-build --configuration {{.BUILD_CONFIGURATION}}
    silent: true

  tests:
    desc: "Run all backend tests (unit + integration)"
    deps:
      - build
    cmds:
      - echo "Running all tests..."
      - dotnet test {{.SOLUTION_FILE}} --no-build --configuration {{.BUILD_CONFIGURATION}}
    silent: true

  tests:unit:
    desc: "Run unit tests only (fast, no external dependencies)"
    deps:
      - build
    cmds:
      - echo "Running unit tests..."
      - dotnet test {{.SOLUTION_FILE}} --no-build --configuration {{.BUILD_CONFIGURATION}} --filter "FullyQualifiedName!~IntegrationTests"
    silent: true

  tests:integration:
    desc: "Run integration tests only (requires Docker for Testcontainers)"
    deps:
      - build
    cmds:
      - echo "Running integration tests (Docker required)..."
      - dotnet test {{.SOLUTION_FILE}} --no-build --configuration {{.BUILD_CONFIGURATION}} --filter "FullyQualifiedName~IntegrationTests"
    silent: true

  tests:skills:unit:
    desc: "Run Skills feature unit tests only"
    deps:
      - build
    cmds:
      - echo "Running Skills unit tests..."
      - dotnet test tests/CVBuilder.Features.Skills.Tests/CVBuilder.Features.Skills.Tests.csproj --no-build --configuration {{.BUILD_CONFIGURATION}}
    silent: true

  tests:skills:integration:
    desc: "Run Skills feature integration tests only (requires Docker for Testcontainers)"
    deps:
      - build
    cmds:
      - echo "Running Skills integration tests (Docker required)..."
      - dotnet test tests/CVBuilder.Features.Skills.IntegrationTests/CVBuilder.Features.Skills.IntegrationTests.csproj --no-build --configuration {{.BUILD_CONFIGURATION}}
    silent: true

  tests:coverage:
    desc: "Run backend tests with coverage report"
    deps:
      - build
    cmds:
      - echo "Running tests with coverage..."
      - dotnet test {{.SOLUTION_FILE}} --no-build --configuration {{.BUILD_CONFIGURATION}} --collect:"XPlat Code Coverage"
      - reportgenerator -reports:**/coverage.cobertura.xml -targetdir:CoverageReport -reporttypes:Html
    silent: true

  docker:build:
    desc: "Build Docker image for backend"
    dir: '{{.ROOT_DIR}}'
    cmds:
      - echo "Building Docker image for backend..."
      - docker build -f backend/src/Dockerfile -t {{.BACKEND_IMAGE_NAME}}:latest .
    silent: true

  docker:push:
    deps:
      - docker:build
    desc: "Push Docker image for backend"
    cmds:
      - echo "Pushing Docker image for backend..."
      - docker push {{.BACKEND_IMAGE_NAME}}:latest
    silent: true

  clean:
    desc: "Clean backend build artifacts"
    cmds:
      - echo "Cleaning backend..."
      - dotnet clean {{.SOLUTION_FILE}} --configuration {{.BUILD_CONFIGURATION}}
    silent: true
